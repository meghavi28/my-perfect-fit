<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" fill="none">
  <!-- Outer Circle - Tape Roll -->
  <circle cx="18" cy="18" r="16" fill="hsl(262 83% 58%)"/>
  <!-- Inner Circle - Center Hole -->
  <circle cx="18" cy="18" r="8" fill="white"/>
  <!-- Spiral Tape Layers -->
  <circle cx="18" cy="18" r="14" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="2 2"/>
  <circle cx="18" cy="18" r="12" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="2 2"/>
  <circle cx="18" cy="18" r="10" fill="none" stroke="white" stroke-width="1.5" stroke-dasharray="2 2"/>
  <!-- Pulled Out Tape -->
  <rect x="18" y="2" width="12" height="4" rx="2" fill="hsl(280 100% 70%)"/>
  <!-- Measurement Marks on Pulled Tape -->
  <line x1="20" y1="2" x2="20" y2="6" stroke="white" stroke-width="1.5"/>
  <line x1="24" y1="2" x2="24" y2="6" stroke="white" stroke-width="1.5"/>
  <line x1="28" y1="2" x2="28" y2="6" stroke="white" stroke-width="1.5"/>
</svg>